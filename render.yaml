# render.yaml
services:
  - type: web
    name: rahl-video-generator
    runtime: python
    region: oregon  # or frankfurt
    plan: professional  # Need at least Professional plan for CPU/RAM
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: HF_HOME
        value: /opt/render/project/.cache/huggingface
      - key: TORCH_HOME
        value: /opt/render/project/.cache/torch
    disk:
      name: models
      mountPath: /opt/render/project/.cache
      sizeGB: 20  # Need space for models
